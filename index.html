<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>決済CSV 仕訳データ変換ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-container {
            max-height: calc(100vh - 350px);
            overflow-y: auto;
        }
        th {
            position: sticky;
            top: 0;
            background-color: #f3f4f6;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center py-8">

    <div class="w-full max-w-6xl px-4 flex flex-col gap-6">
        
        <!-- ヘッダー部分 -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h1 class="text-2xl font-bold mb-4 text-gray-800">決済CSV 仕訳データ変換ツール (Square, Airペイ等)</h1>
            <p class="text-sm text-gray-600 mb-6">
                お手元の取引履歴ファイル（CSV）を選択してください。<br>
                Square以外のファイルでも、読み込みたい列を自由に指定することで、売上と手数料を分けた確定申告用のフォーマットに変換できます。
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 items-center justify-between bg-gray-50 p-4 rounded-lg border border-gray-100">
                <div class="flex items-center gap-4 w-full sm:w-auto">
                    <input type="file" id="fileInput" accept=".csv" class="block w-full text-sm text-gray-500
                        file:mr-4 file:py-2 file:px-4
                        file:rounded-md file:border-0
                        file:text-sm file:font-semibold
                        file:bg-blue-50 file:text-blue-700
                        hover:file:bg-blue-100 cursor-pointer" />
                </div>

                <div class="flex items-center gap-4 w-full sm:w-auto">
                    <div class="text-sm text-gray-500 flex items-center gap-2">
                        <span>文字コード:</span>
                        <label class="cursor-pointer"><input type="radio" name="encoding" value="UTF-8" checked class="mr-1">UTF-8</label>
                        <label class="cursor-pointer"><input type="radio" name="encoding" value="Shift_JIS" class="mr-1">Shift-JIS</label>
                    </div>
                    <button id="copyBtn" onclick="copyToClipboard()" class="hidden bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded-md font-medium transition-colors duration-200 flex items-center gap-2 whitespace-nowrap">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                        </svg>
                        結果をコピー
                    </button>
                </div>
            </div>
        </div>

        <!-- マッピング設定セクション（ファイル読み込み後に表示） -->
        <div id="mappingSection" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hidden border-t-4 border-t-blue-500">
            <h2 class="text-lg font-bold mb-2 text-gray-800">列の割り当て（マッピング）設定</h2>
            <p class="text-sm text-gray-600 mb-5">
                CSVの列名を自動認識しました。各項目として読み込む列が正しいか確認し、違っている場合は手動で変更してください。
            </p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 bg-gray-50 p-4 rounded-lg">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">📅 日付 <span class="text-red-500">*</span></label>
                    <select id="col-date" class="w-full border border-gray-300 rounded-md py-2 px-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">💰 売上（金額） <span class="text-red-500">*</span></label>
                    <select id="col-sales" class="w-full border border-gray-300 rounded-md py-2 px-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">💸 手数料</label>
                    <select id="col-fee" class="w-full border border-gray-300 rounded-md py-2 px-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">💳 決済手段</label>
                    <select id="col-method" class="w-full border border-gray-300 rounded-md py-2 px-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">📝 摘要・内容</label>
                    <select id="col-memo" class="w-full border border-gray-300 rounded-md py-2 px-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
            </div>
            
            <div class="mt-5 flex justify-end">
                <button id="generateBtn" class="bg-green-600 hover:bg-green-700 text-white py-2 px-8 rounded-md font-bold transition-colors duration-200 shadow-sm">
                    この設定でデータを変換する
                </button>
            </div>
        </div>

        <!-- テーブル部分 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hidden" id="tableWrapper">
            <div class="table-container">
                <table class="min-w-full text-sm text-left whitespace-nowrap">
                    <thead class="text-gray-700 uppercase bg-gray-50 border-b">
                        <tr>
                            <th scope="col" class="px-6 py-3">日付</th>
                            <th scope="col" class="px-6 py-3">勘定科目</th>
                            <th scope="col" class="px-6 py-3">補助項目</th>
                            <th scope="col" class="px-6 py-3">内容・摘要</th>
                            <th scope="col" class="px-6 py-3 text-right">金額</th>
                            <th scope="col" class="px-6 py-3">決済手段</th>
                            <th scope="col" class="px-6 py-3">区分</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-200">
                        <!-- データがここに挿入されます -->
                    </tbody>
                </table>
            </div>
            <div class="p-4 bg-gray-50 border-t text-sm text-gray-500 flex justify-between items-center">
                <span id="recordCount">合計: 0件</span>
                <span class="text-xs font-bold text-blue-600">※上部の「結果をコピー」ボタンを押して、スプレッドシートのA1セルに貼り付けてください。</span>
            </div>
        </div>
        
    </div>

    <!-- トースト通知 -->
    <div id="toast" class="hidden fixed bottom-6 right-6 px-6 py-3 rounded shadow-lg transition-opacity text-white z-50"></div>

    <script>
        let currentCSVLines = [];
        let dataStartIndex = 0;
        let generatedData = [];

        // ファイル入力のイベントリスナー
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const encoding = document.querySelector('input[name="encoding"]:checked').value;
            const reader = new FileReader();

            reader.onload = function(event) {
                const text = event.target.result;
                analyzeCSV(text);
            };

            reader.onerror = function() {
                showToast('ファイルの読み込みに失敗しました。', true);
            };

            reader.readAsText(file, encoding);
        });

        // ラジオボタン変更時に再読み込みを促す
        document.querySelectorAll('input[name="encoding"]').forEach(radio => {
            radio.addEventListener('change', () => {
                const fileInput = document.getElementById('fileInput');
                if(fileInput.files.length > 0) {
                    fileInput.dispatchEvent(new Event('change'));
                }
            });
        });

        // CSVパース処理
        function parseCSV(text, delimiter) {
            let result = [];
            let row = [];
            let inQuotes = false;
            let current = '';
            
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                if (inQuotes) {
                    if (char === '"') {
                        if (i + 1 < text.length && text[i + 1] === '"') {
                            current += '"';
                            i++;
                        } else {
                            inQuotes = false;
                        }
                    } else {
                        current += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === delimiter) {
                        row.push(current);
                        current = '';
                    } else if (char === '\n' || char === '\r') {
                        if (char === '\r' && i + 1 < text.length && text[i + 1] === '\n') {
                            i++;
                        }
                        row.push(current);
                        result.push(row);
                        row = [];
                        current = '';
                    } else {
                        current += char;
                    }
                }
            }
            if (current !== '') row.push(current);
            if (row.length > 0) result.push(row);
            return result;
        }

        // CSVの解析とマッピングUIの表示
        function analyzeCSV(text) {
            const delimiter = text.includes('\t') ? '\t' : ',';
            currentCSVLines = parseCSV(text, delimiter);
            
            // ヘッダー行を探す（先頭10行の中で、列数が一番多い行をヘッダーと仮定）
            let maxCols = 0;
            let headerIndex = -1;
            for (let i = 0; i < Math.min(10, currentCSVLines.length); i++) {
                const row = currentCSVLines[i];
                const validCols = row.filter(c => c.trim() !== '').length;
                if (validCols > maxCols && validCols > 2) {
                    maxCols = validCols;
                    headerIndex = i;
                }
            }
            
            if (headerIndex === -1) {
                showToast('エラー: 有効なCSVデータが見つかりません。', true);
                return;
            }
            
            const headers = currentCSVLines[headerIndex].map(h => h.trim().replace(/^"|"$/g, ''));
            dataStartIndex = headerIndex + 1;
            
            setupMappingUI(headers);
        }

        // マッピングUIの構築
        function setupMappingUI(headers) {
            const selects = ['date', 'sales', 'fee', 'method', 'memo'];
            
            // 各項目に対する推測キーワード
            const keywords = {
                'date': ['日付', 'date', '取引日', '利用日', '発生日', 'お取引日'],
                'sales': ['総売上高', '売上', '入金', '金額', 'お取引金額', '取引金額', '決済金額', '売上金額'],
                'fee': ['手数料', '決済手数料'],
                'method': ['カード種別', '決済手段', '決済方法', '支払方法', 'ソース', 'チャネル', 'ブランド', '電子マネー'],
                'memo': ['レシート詳細', '顧客名', '摘要', '内容', '品名', 'メモ', '詳細', '商品']
            };
            
            selects.forEach(key => {
                const sel = document.getElementById(`col-${key}`);
                sel.innerHTML = ''; // リセット
                
                // 手数料、手段、摘要は「なし」を選択可能に
                if (key === 'fee' || key === 'method' || key === 'memo') {
                    const opt = document.createElement('option');
                    opt.value = '-1';
                    opt.textContent = '（この項目は使用しない）';
                    sel.appendChild(opt);
                }
                
                headers.forEach((h, idx) => {
                    const opt = document.createElement('option');
                    opt.value = idx;
                    opt.textContent = h ? `${h} (列${idx + 1})` : `(列${idx + 1})`;
                    sel.appendChild(opt);
                });
                
                // キーワードに基づいて自動選択
                let selectedIndex = -1;
                for (let kw of keywords[key]) {
                    const idx = headers.findIndex(h => h && h.toLowerCase().includes(kw.toLowerCase()));
                    if (idx !== -1) {
                        selectedIndex = idx;
                        break;
                    }
                }
                
                if (selectedIndex !== -1) {
                    sel.value = selectedIndex;
                } else if (key === 'date' && headers.length > 0) {
                    sel.value = 0; // わからなければ先頭列
                } else if (key === 'sales' && headers.length > 1) {
                    sel.value = 1; // わからなければ2列目
                }
            });
            
            // UIの表示切り替え
            document.getElementById('mappingSection').classList.remove('hidden');
            document.getElementById('tableWrapper').classList.add('hidden');
            document.getElementById('copyBtn').classList.add('hidden');
            
            showToast('列の自動認識が完了しました。設定を確認して「変換する」を押してください。');
        }

        // 「変換する」ボタンの処理
        document.getElementById('generateBtn').addEventListener('click', function() {
            generateData();
        });

        // 指定された列からデータを生成
        function generateData() {
            const idxDate = parseInt(document.getElementById('col-date').value);
            const idxSales = parseInt(document.getElementById('col-sales').value);
            const idxFee = parseInt(document.getElementById('col-fee').value);
            const idxMethod = parseInt(document.getElementById('col-method').value);
            const idxMemo = parseInt(document.getElementById('col-memo').value);
            
            generatedData = [];
            
            const parseAmount = (val) => {
                if (!val) return 0;
                // ¥, カンマ, スペースを除去して数値化
                const cleaned = val.replace(/[¥,\\\s]/g, '');
                const num = parseInt(cleaned, 10);
                return isNaN(num) ? 0 : num;
            };
            
            for (let i = dataStartIndex; i < currentCSVLines.length; i++) {
                const row = currentCSVLines[i];
                if (row.length === 0 || (row.length === 1 && row[0].trim() === '')) continue;
                
                const dateRaw = row[idxDate] ? row[idxDate].trim().replace(/^"|"$/g, '') : '';
                // 日付記号(-や/)が含まれていない行は合計行などの可能性が高いのでスキップ
                if (!dateRaw || (!dateRaw.includes('-') && !dateRaw.includes('/'))) continue;
                
                const salesRaw = row[idxSales] ? row[idxSales].trim().replace(/^"|"$/g, '') : '';
                const salesAmount = parseAmount(salesRaw);
                
                let feeAmount = 0;
                if (idxFee !== -1) {
                    const feeRaw = row[idxFee] ? row[idxFee].trim().replace(/^"|"$/g, '') : '';
                    feeAmount = parseAmount(feeRaw);
                }
                
                const method = idxMethod !== -1 && row[idxMethod] ? row[idxMethod].trim().replace(/^"|"$/g, '') : '';
                let memo = idxMemo !== -1 && row[idxMemo] ? row[idxMemo].trim().replace(/^"|"$/g, '') : '';
                if (!memo || memo === '""' || memo === '任意の金額') memo = '売上';
                
                // --- 売上の仕訳作成 ---
                if (salesAmount !== 0) {
                    generatedData.push({
                        date: dateRaw,
                        account: salesAmount > 0 ? '売上高' : '売上高(マイナス/返金)', // マイナス売上の場合
                        subAccount: '決済代行',
                        memo: salesAmount < 0 ? `[返金等] ${memo}` : memo,
                        amount: salesAmount, // マイナスの場合はそのまま出力
                        method: method,
                        taxType: '課税売上10%'
                    });
                }
                
                // --- 手数料の仕訳作成 ---
                if (feeAmount !== 0) {
                    generatedData.push({
                        date: dateRaw,
                        account: '支払手数料',
                        subAccount: '決済手数料',
                        memo: '決済手数料',
                        amount: Math.abs(feeAmount), // 手数料は絶対値(プラス)で計上
                        method: method,
                        taxType: '対象外'
                    });
                }
            }
            
            if (generatedData.length > 0) {
                renderTable();
                document.getElementById('tableWrapper').classList.remove('hidden');
                document.getElementById('copyBtn').classList.remove('hidden');
                document.getElementById('tableWrapper').scrollIntoView({ behavior: 'smooth', block: 'start' });
                showToast(`変換完了！ ${generatedData.length}件の明細を作成しました。`);
            } else {
                showToast('処理可能な取引データが見つかりませんでした。列の設定を見直してください。', true);
            }
        }

        // テーブルの描画
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            generatedData.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.className = index % 2 === 0 ? 'bg-white' : 'bg-gray-50';
                
                tr.innerHTML = `
                    <td class="px-6 py-2">${row.date}</td>
                    <td class="px-6 py-2 font-medium ${row.account.includes('売上高') ? 'text-blue-600' : 'text-red-600'}">${row.account}</td>
                    <td class="px-6 py-2">${row.subAccount}</td>
                    <td class="px-6 py-2 truncate max-w-xs" title="${row.memo}">${row.memo}</td>
                    <td class="px-6 py-2 text-right">${row.amount.toLocaleString()}</td>
                    <td class="px-6 py-2">${row.method}</td>
                    <td class="px-6 py-2 text-xs text-gray-500">${row.taxType}</td>
                `;
                tbody.appendChild(tr);
            });
            
            document.getElementById('recordCount').textContent = `合計: ${generatedData.length} 行`;
        }

        // クリップボードにコピー
        function copyToClipboard() {
            if (generatedData.length === 0) return;
            
            // TSV（タブ区切り）形式で文字列を作成
            let tsv = "日付\t勘定科目\t補助項目\t内容・摘要\t金額\t決済手段\t区分\n";
            for(let row of generatedData) {
                tsv += `${row.date}\t${row.account}\t${row.subAccount}\t${row.memo}\t${row.amount}\t${row.method}\t${row.taxType}\n`;
            }
            
            const textarea = document.createElement('textarea');
            textarea.value = tsv;
            textarea.style.position = 'fixed';
            textarea.style.opacity = 0;
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showToast('コピーしました！スプレッドシートのA1セルに貼り付けてください。');
            } catch (err) {
                showToast('コピーに失敗しました。', true);
            } finally {
                document.body.removeChild(textarea);
            }
        }

        // トースト通知の表示
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed bottom-6 right-6 px-6 py-3 rounded shadow-lg transition-opacity text-white z-50 ${isError ? 'bg-red-500' : 'bg-green-600'}`;
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => {
                    toast.classList.add('hidden');
                    toast.classList.remove('opacity-0');
                }, 300);
            }, 4000);
        }
    </script>
</body>
</html>
